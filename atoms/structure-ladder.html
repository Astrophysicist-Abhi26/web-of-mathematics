<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Structure Ladder</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1117;--text:#e9e6dc;--dim:#8f95a3;--gold:#d9a441;--line:rgba(255,255,255,0.09);}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,sans-serif;overflow:hidden;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
header{padding:12px 16px 8px;border-bottom:1px solid var(--line);}
h1{font-family:'Spectral',serif;font-size:18px;font-weight:600;margin:0;}
h1 em{font-style:italic;color:var(--dim);font-weight:400;}
.stages{display:flex;gap:6px;margin-top:9px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.stages::-webkit-scrollbar{display:none;}
.stage-chip{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
  padding:6px 10px;border-radius:999px;border:1px solid var(--line);color:var(--dim);
  background:rgba(255,255,255,0.04);cursor:pointer;white-space:nowrap;}
.stage-chip.on{border-color:var(--gold);color:var(--gold);background:rgba(217,164,65,0.12);}
main{flex:1;position:relative;min-height:0;}
canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
footer{border-top:1px solid var(--line);padding:12px 16px 16px;background:linear-gradient(180deg,rgba(10,12,18,0.6),var(--bg));}
.f-title{font-family:'Spectral',serif;font-size:17px;font-weight:600;margin:0 0 4px;color:var(--gold);}
.f-added{font-size:13px;line-height:1.45;margin:0 0 8px;}
.f-q{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);line-height:1.6;}
.f-q b{color:#9fd6a8;font-weight:500;}
.nav{display:flex;gap:8px;margin-top:10px;}
.nbtn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,0.05);
  color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
.nbtn:active{background:rgba(255,255,255,0.12);}
.nbtn.primary{background:rgba(217,164,65,0.16);border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>The Structure Ladder <em>— a dull space acquires powers</em></h1>
    <div class="stages" id="stages"></div>
  </header>
  <main><canvas id="cv"></canvas></main>
  <footer>
    <div class="f-title" id="ft"></div>
    <div class="f-added" id="fa"></div>
    <div class="f-q" id="fq"></div>
    <div class="nav">
      <div class="nbtn" id="prev">← previous</div>
      <div class="nbtn primary" id="next">add structure →</div>
    </div>
  </footer>
</div>
<script>
"use strict";
const STAGES=[
 {chip:"0 · bare set", title:"A bare set",
  added:"Just points. No nearness, no distance, nothing between them — the only structure is membership.",
  q:"Askable now: <b>how many points?</b> (cardinality) — and truly nothing else. Two points 'close together' means nothing yet."},
 {chip:"1 · + topology", title:"+ Topology",
  added:"Declare certain collections of points 'open sets' (three axioms). Suddenly points have neighborhoods.",
  q:"Newly askable: <b>nearness · limits · continuity · connectedness · compactness</b>. Still meaningless: distance, angle, straightness."},
 {chip:"2 · + smooth structure", title:"+ Smooth structure",
  added:"Cover the space with coordinate charts whose overlaps are differentiable. Calculus switches on: tangent vectors exist.",
  q:"Newly askable: <b>derivatives · velocities · vector fields · flows</b>. Still meaningless: how long a vector is, the angle between two."},
 {chip:"3 · + metric", title:"+ Riemannian metric (lengths)",
  added:"An inner product on every tangent space. Curve lengths integrate, shortest paths — geodesics — exist, and curvature becomes measurable from inside.",
  q:"Newly askable: <b>distance · geodesics · curvature · balls of radius r</b>."},
 {chip:"4 · angles", title:"The same metric buys angles",
  added:"The inner product also gives ⟨u,v⟩ = |u||v|cos θ: angles, orthogonality, projections — the full Euclidean toolkit, pointwise.",
  q:"Newly askable: <b>angle between curves · orthogonal frames · projections</b>."},
 {chip:"5 · + orientation & volume", title:"+ Orientation & volume form",
  added:"A consistent notion of 'handedness' plus a top-degree form: signed areas and volumes, and integration of differential forms — Stokes' theorem awaits.",
  q:"Newly askable: <b>volume · signed area · ∫ over the space · Stokes' theorem</b>. The ladder from bare set to geometry is complete."}
];

let stage=0, shown=0; // shown eases toward stage
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=cv.clientWidth; H=cv.clientHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);

/* seeded points */
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rnd=mulberry(26);
const PTS=[];for(let i=0;i<26;i++)PTS.push({x:0.12+0.76*rnd(),y:0.12+0.76*rnd()});
const A=PTS[7], B=PTS[16]; // marked points

function ease(a,b,t){return a+(b-a)*t;}
function lerpStage(s){ // per-stage alpha in [0,1]
  return Math.max(0,Math.min(1, shown-s+1));
}
function px(p){return {x:p.x*W, y:p.y*H*0.96+H*0.02};}

function grid(t,alpha){ // curvilinear chart grid
  ctx.strokeStyle=`rgba(91,156,224,${0.22*alpha})`;
  ctx.lineWidth=1;
  const n=9;
  for(let i=0;i<=n;i++){
    ctx.beginPath();
    for(let j=0;j<=40;j++){
      const u=i/n, v=j/40;
      const wob=0.03*Math.sin(6.28*(v+u)+t*0.0006);
      const p=px({x:0.06+0.88*u+wob*0.4, y:0.05+0.9*v+wob});
      j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);
    }
    ctx.stroke();
    ctx.beginPath();
    for(let j=0;j<=40;j++){
      const v=i/n, u=j/40;
      const wob=0.03*Math.sin(6.28*(u-v)+t*0.0006);
      const p=px({x:0.06+0.88*u+wob, y:0.05+0.9*v+wob*0.4});
      j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);
    }
    ctx.stroke();
  }
}
function arrow(x1,y1,x2,y2,color,w){
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-10*Math.cos(a-0.4),y2-10*Math.sin(a-0.4));
  ctx.lineTo(x2-10*Math.cos(a+0.4),y2-10*Math.sin(a+0.4));
  ctx.closePath();ctx.fill();
}
function label(txt,x,y,color){
  ctx.font='11px "IBM Plex Mono",monospace';
  ctx.fillStyle=color;ctx.fillText(txt,x,y);
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  const a1=lerpStage(1), a2=lerpStage(2), a3=lerpStage(3), a4=lerpStage(4), a5=lerpStage(5);

  // stage 2: chart grid
  if(a2>0) grid(t,a2);

  // stage 1: open neighborhoods (soft pulsing disks)
  if(a1>0){
    PTS.forEach((p,i)=>{
      const q=px(p);
      const r=(18+8*Math.sin(t*0.001+i))* (0.4+0.6*a1);
      const g=ctx.createRadialGradient(q.x,q.y,2,q.x,q.y,r);
      g.addColorStop(0,`rgba(87,171,121,${0.28*a1})`);
      g.addColorStop(1,'rgba(87,171,121,0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(q.x,q.y,r,0,6.28);ctx.fill();
    });
  }

  // stage 3: geodesic + distance + metric ball
  const pa=px(A), pb=px(B);
  if(a3>0){
    ctx.strokeStyle=`rgba(217,164,65,${0.9*a3})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);
    const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2-40;
    ctx.quadraticCurveTo(mx,my,pb.x,pb.y);ctx.stroke();
    label('d(p,q) — along the geodesic',(pa.x+pb.x)/2-70,my-8,`rgba(217,164,65,${a3})`);
    ctx.strokeStyle=`rgba(217,164,65,${0.45*a3})`;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(pa.x,pa.y,56,0,6.28);ctx.stroke();ctx.setLineDash([]);
    label('ball of radius r',pa.x-30,pa.y-62,`rgba(217,164,65,${0.8*a3})`);
  }

  // stage 2: tangent vector at A
  if(a2>0){
    arrow(pa.x,pa.y,pa.x+70*a2,pa.y-30*a2,`rgba(91,156,224,${a2})`,2);
    label('tangent vector',pa.x+40,pa.y-38,`rgba(91,156,224,${a2})`);
  }

  // stage 4: second vector + angle arc
  if(a4>0){
    arrow(pa.x,pa.y,pa.x+22*a4,pa.y+62*a4,`rgba(171,123,214,${a4})`,2);
    ctx.strokeStyle=`rgba(233,230,220,${0.85*a4})`;ctx.lineWidth=1.5;
    const ang1=Math.atan2(-30,70), ang2=Math.atan2(62,22);
    ctx.beginPath();ctx.arc(pa.x,pa.y,26,ang1,ang2);ctx.stroke();
    label('θ = arccos ⟨u,v⟩/|u||v|',pa.x+30,pa.y+26,`rgba(233,230,220,${a4})`);
  }

  // stage 5: oriented parallelogram (signed area)
  if(a5>0){
    const ux=70,uy=-30, vx=22,vy=62;
    ctx.fillStyle=`rgba(217,164,65,${0.18*a5})`;
    ctx.strokeStyle=`rgba(217,164,65,${0.7*a5})`;ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(pa.x,pa.y);ctx.lineTo(pa.x+ux,pa.y+uy);
    ctx.lineTo(pa.x+ux+vx,pa.y+uy+vy);ctx.lineTo(pa.x+vx,pa.y+vy);
    ctx.closePath();ctx.fill();ctx.stroke();
    label('signed area = u ∧ v',pa.x+56,pa.y+52,`rgba(217,164,65,${a5})`);
    // orientation loop
    ctx.strokeStyle=`rgba(159,214,168,${0.9*a5})`;ctx.lineWidth=1.6;
    ctx.beginPath();ctx.arc(W*0.85,H*0.16,20,0.4,5.6);ctx.stroke();
    arrow(W*0.85+20*Math.cos(5.6),H*0.16+20*Math.sin(5.6),
          W*0.85+20*Math.cos(5.9),H*0.16+20*Math.sin(5.9),`rgba(159,214,168,${0.9*a5})`,1.6);
    label('orientation',W*0.85-30,H*0.16+38,`rgba(159,214,168,${0.9*a5})`);
  }

  // the points themselves — always
  PTS.forEach(p=>{
    const q=px(p);
    ctx.fillStyle='#e9e6dc';
    ctx.beginPath();ctx.arc(q.x,q.y,3,0,6.28);ctx.fill();
  });
  // marked points
  [[pa,'p'],[pb,'q']].forEach(([q,nm])=>{
    ctx.fillStyle='#d9a441';
    ctx.beginPath();ctx.arc(q.x,q.y,4.5,0,6.28);ctx.fill();
    label(nm,q.x+7,q.y+4,'#d9a441');
  });
}

function loop(t){
  shown += (stage-shown)*0.08;
  if(Math.abs(stage-shown)<0.001) shown=stage;
  draw(t);
  requestAnimationFrame(loop);
}

/* UI */
const stagesEl=document.getElementById('stages');
STAGES.forEach((s,i)=>{
  const c=document.createElement('div');c.className='stage-chip';c.textContent=s.chip;
  c.onclick=()=>setStage(i);
  stagesEl.appendChild(c);
});
function setStage(i){
  stage=Math.max(0,Math.min(STAGES.length-1,i));
  document.querySelectorAll('.stage-chip').forEach((c,j)=>c.classList.toggle('on',j===stage));
  document.getElementById('ft').textContent=STAGES[stage].title;
  document.getElementById('fa').textContent=STAGES[stage].added;
  document.getElementById('fq').innerHTML=STAGES[stage].q;
  document.getElementById('next').textContent = stage===STAGES.length-1 ? 'ladder complete ✓' : 'add structure →';
}
document.getElementById('next').onclick=()=>setStage(stage+1);
document.getElementById('prev').onclick=()=>setStage(stage-1);

resize();setStage(0);requestAnimationFrame(loop);
</script>
</body>
</html>
